<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料 - 校园拼单平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f3ef; min-height: 100vh; }
    .app-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { background: linear-gradient(180deg, #2e3f34 0%, #24342b 100%); color: white; padding: 1rem; }
    .sidebar .brand { padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
    .sidebar .brand-mark { width: 40px; height: 40px; background: rgba(242,203,184,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .sidebar .brand h1 { font-size: 1.2rem; margin-top: 0.5rem; }
    .sidebar .menu { list-style: none; }
    .sidebar .menu li { margin-bottom: 0.3rem; }
    .sidebar .menu a { display: block; padding: 0.7rem; border-radius: 10px; color: rgba(255,255,255,0.8); text-decoration: none; }
    .sidebar .menu a:hover { background: rgba(255,255,255,0.1); }
    .sidebar .menu a.active { background: rgba(242,203,184,0.2); color: white; }
    .main { padding: 1rem; display: flex; flex-direction: column; }
    .header { background: white; border-radius: 12px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .header h2 { color: #2e3f34; }
    .header .actions { display: flex; align-items: center; gap: 0.5rem; }
    .header .welcome { color: #6b7c70; margin-right: 1rem; }
    .content { flex: 1; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .stat-card { background: white; border-radius: 12px; padding: 1rem; }
    .stat-card .label { color: #6b7c70; font-size: 0.85rem; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #2e3f34; }
    .section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-header { margin-bottom: 1rem; }
    .section-header h3 { color: #2e3f34; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
    .detail-panel { background: white; border-radius: 12px; padding: 1.2rem; }
    .detail-panel .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .detail-panel h4 { color: #2e3f34; margin: 0; }
    .detail-list { list-style: none; }
    .detail-list li { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #f0ebe4; }
    .detail-list li:last-child { border-bottom: none; }
    .detail-list span { color: #6b7c70; }
    .detail-list strong { color: #2e3f34; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; color: #4a6b5a; font-weight: 500; }
    .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #e0d8cf; border-radius: 10px; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: #d87b4d; box-shadow: 0 0 0 2px rgba(216,123,77,0.2); }
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #d87b4d; color: white; }
    .btn-secondary { background: #f0ebe4; color: #2e3f34; }
    .btn-outline { border: 1px solid #d87b4d; color: #d87b4d; background: white; }
    .tag { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .tag-success { background: #d4edda; color: #155724; }
    .tag-warning { background: #fff3cd; color: #856404; }
    @media (max-width: 768px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .header { flex-direction: column; align-items: flex-start; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">CSO</div>
        <h1>校园拼单平台</h1>
      </div>
      <ul class="menu">
        <li><a href="orders.html">拼单大厅</a></li>
        <li><a href="create-order.html">发起拼单</a></li>
        <li><a href="my-orders.html">我的拼单</a></li>
        <li><a href="complaints.html">我的投诉</a></li>
        <li><a href="profile.html" class="active">个人资料</a></li>
        <li><a href="credit.html">信用分</a></li>
      </ul>
    </div>
    
    <div class="main">
      <div class="header">
        <h2>个人资料</h2>
        <div class="actions">
          <span class="welcome">欢迎，张三</span>
          <button class="btn btn-secondary" onclick="location.href='login.html'">退出登录</button>
        </div>
      </div>
      
      <div class="content">
        <div class="stats">
          <div class="stat-card">
            <div class="label">资料完整度</div>
            <div class="value">80%</div>
          </div>
          <div class="stat-card">
            <div class="label">认证状态</div>
            <div class="value">已认证</div>
          </div>
          <div class="stat-card">
            <div class="label">信用等级</div>
            <div class="value">A</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h3>个人资料概览</h3>
          </div>

          <div class="detail-grid">
            <div class="detail-panel">
              <div class="header-row">
                <h4>基础身份</h4>
                <span class="tag tag-success">正常</span>
              </div>
              <ul class="detail-list">
                <li><span>用户 ID</span><strong>U1001</strong></li>
                <li><span>手机号</span><strong>138****1234</strong></li>
                <li><span>账号状态</span><strong>正常</strong></li>
                <li><span>注册时间</span><strong>2024-01-01</strong></li>
              </ul>
            </div>

            <div class="detail-panel">
              <div class="header-row">
                <h4>业务资料</h4>
                <button class="btn btn-outline btn-sm">去认证</button>
              </div>
              <ul class="detail-list">
                <li><span>昵称</span><strong>张三</strong></li>
                <li><span>联系方式</span><strong>微信 zhangsan_01</strong></li>
                <li><span>学号</span><strong>2021****002</strong></li>
                <li><span>信用分</span><strong>95</strong></li>
              </ul>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h3>修改资料</h3>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>昵称</label>
              <input type="text" value="张三" placeholder="例如：宿舍拼单小队长">
            </div>
            <div class="form-group">
              <label>联系方式</label>
              <input type="text" value="微信 zhangsan_01" placeholder="例如：微信 zhangsan_01">
            </div>
          </div>

          <div class="page-actions" style="margin-top: 1rem;">
            <button class="btn btn-secondary" onclick="location.href='verify-student.html'">去完成认证</button>
            <button class="btn btn-secondary" onclick="location.href='credit.html'">查看信用分</button>
            <button class="btn btn-primary">保存修改</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
