<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据报表 - 管理员后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f3ef; min-height: 100vh; }
    .app-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); color: white; padding: 1rem; }
    .sidebar .brand { padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
    .sidebar .brand-mark { width: 40px; height: 40px; background: rgba(242,203,184,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .sidebar .brand h1 { font-size: 1.2rem; margin-top: 0.5rem; }
    .sidebar .menu { list-style: none; }
    .sidebar .menu li { margin-bottom: 0.3rem; }
    .sidebar .menu a { display: block; padding: 0.7rem; border-radius: 10px; color: rgba(255,255,255,0.8); text-decoration: none; }
    .sidebar .menu a:hover { background: rgba(255,255,255,0.1); }
    .sidebar .menu a.active { background: rgba(242,203,184,0.2); color: white; }
    .main { padding: 1rem; display: flex; flex-direction: column; }
    .header { background: white; border-radius: 12px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .header h2 { color: #2c3e50; }
    .header .actions { display: flex; align-items: center; gap: 0.5rem; }
    .content { flex: 1; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .stat-card { background: white; border-radius: 12px; padding: 1.2rem; }
    .stat-card .label { color: #6b7c70; font-size: 0.9rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #2c3e50; }
    .section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-header { margin-bottom: 1rem; }
    .section-header h3 { color: #2c3e50; }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .toolbar select { padding: 0.6rem; border: 1px solid #e0d8cf; border-radius: 8px; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #d87b4d; color: white; }
    .btn-secondary { background: #f0ebe4; color: #2c3e50; }
    .chart-container { height: 300px; background: #f8f6f2; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #f0ebe4; }
    .table th { background: #f8f6f2; color: #4a6b5a; }
    @media (max-width: 768px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .header { flex-direction: column; align-items: flex-start; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">ADMIN</div>
        <h1>管理员后台</h1>
      </div>
      <ul class="menu">
        <li><a href="admin-dashboard.html">仪表盘</a></li>
        <li><a href="admin-orders.html">订单管理</a></li>
        <li><a href="admin-complaints.html">投诉管理</a></li>
        <li><a href="admin-users.html">用户管理</a></li>
        <li><a href="admin-reports.html" class="active">数据报表</a></li>
        <li><a href="login.html">退出登录</a></li>
      </ul>
    </div>
    
    <div class="main">
      <div class="header">
        <h2>数据报表</h2>
        <div class="actions">
          <span style="color: #6b7c70; margin-right: 1rem;">管理员</span>
          <button class="btn btn-secondary" onclick="location.href='login.html'">退出登录</button>
        </div>
      </div>
      
      <div class="content">
        <div class="toolbar">
          <select>
            <option value="week">本周</option>
            <option value="month">本月</option>
            <option value="quarter">本季度</option>
          </select>
          <button class="btn btn-primary">生成报表</button>
          <button class="btn btn-secondary">导出Excel</button>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="label">订单总数</div>
            <div class="value">128</div>
          </div>
          <div class="stat-card">
            <div class="label">用户总数</div>
            <div class="value">256</div>
          </div>
          <div class="stat-card">
            <div class="label">投诉总数</div>
            <div class="value">12</div>
          </div>
          <div class="stat-card">
            <div class="label">完成率</div>
            <div class="value">89%</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h3>订单趋势</h3>
          </div>
          <div class="chart-container">
            <div style="text-align: center; color: #6b7c70;">订单趋势图表</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h3>订单类型分布</h3>
          </div>
          <div class="chart-container">
            <div style="text-align: center; color: #6b7c70;">订单类型分布图表</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h3>投诉统计</h3>
          </div>
          <table class="table">
            <thead>
              <tr>
                <th>类型</th>
                <th>数量</th>
                <th>占比</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>未送达</td>
                <td>5</td>
                <td>42%</td>
              </tr>
              <tr>
                <td>商品质量</td>
                <td>4</td>
                <td>33%</td>
              </tr>
              <tr>
                <td>未发货</td>
                <td>2</td>
                <td>17%</td>
              </tr>
              <tr>
                <td>其他</td>
                <td>1</td>
                <td>8%</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
