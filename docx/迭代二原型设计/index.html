<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园拼单平台 - 迭代二原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f3ef; min-height: 100vh; }
    .nav { background: #2e3f34; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .nav a { color: white; text-decoration: none; margin: 0 1rem; }
    .nav a:hover { color: #f2cbb8; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 1rem; }
    h1 { color: #2e3f34; margin-bottom: 1rem; }
    h2 { color: #3d5c4a; margin: 1.5rem 0 1rem; }
    h3 { color: #4a6b5a; margin: 1rem 0 0.5rem; }
    p { color: #6b7c70; line-height: 1.6; }
    .btn { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 20px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }
    .btn-primary { background: #d87b4d; color: white; }
    .btn-primary:hover { background: #c4683a; }
    .btn-secondary { background: #f0ebe4; color: #2e3f34; }
    .btn-secondary:hover { background: #e5ddd3; }
    .btn-outline { border: 1px solid #d87b4d; color: #d87b4d; background: white; }
    .btn-outline:hover { background: #fff8f4; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; color: #4a6b5a; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.7rem; border: 1px solid #e0d8cf; border-radius: 8px; font-size: 1rem; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #d87b4d; box-shadow: 0 0 0 2px rgba(216,123,77,0.2); }
    .form-group textarea { resize: vertical; }
    .input-group { display: flex; gap: 0.5rem; }
    .input-group input { flex: 1; }
    .table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .table th, .table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #f0ebe4; }
    .table th { background: #f8f6f2; color: #4a6b5a; font-weight: 600; }
    .table tr:hover { background: #faf9f7; }
    .tag { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .tag-success { background: #d4edda; color: #155724; }
    .tag-warning { background: #fff3cd; color: #856404; }
    .tag-danger { background: #f8d7da; color: #721c24; }
    .tag-info { background: #d1ecf1; color: #0c5460; }
    .tag-primary { background: #cce5ff; color: #004085; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 12px; padding: 1.2rem; text-align: center; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #2e3f34; }
    .stat-card .label { color: #6b7c70; margin-top: 0.3rem; }
    .order-card { background: white; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
    .order-card .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .order-card h3 { margin: 0; }
    .order-card .detail-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.8rem; }
    .order-card .detail-list li { display: flex; justify-content: space-between; }
    .order-card .detail-list span { color: #6b7c70; }
    .order-card .detail-list strong { color: #2e3f34; }
    .order-card .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .status-bar { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .status-item { flex: 1; text-align: center; padding: 0.8rem; background: #f8f6f2; border-radius: 8px; }
    .status-item.active { background: #e8f5ef; border: 1px solid #3d5c4a; }
    .status-item.done { background: #d4edda; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 1rem; }
    .pagination button { padding: 0.5rem 0.8rem; border: 1px solid #e0d8cf; background: white; border-radius: 6px; cursor: pointer; }
    .pagination button.active { background: #2e3f34; color: white; border-color: #2e3f34; }
    .auth-page { display: grid; grid-template-columns: 1.1fr 1fr; gap: 2rem; min-height: 100vh; padding: 2rem; }
    .auth-hero { display: flex; flex-direction: column; justify-content: center; }
    .auth-hero h1 { font-size: 3rem; line-height: 1.1; margin-bottom: 1rem; }
    .auth-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
    .quick-card { background: white; border-radius: 12px; padding: 1.2rem; cursor: pointer; transition: transform 0.2s; }
    .quick-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .quick-card strong { display: block; color: #2e3f34; margin-bottom: 0.3rem; }
    .quick-card span { color: #6b7c70; font-size: 0.9rem; }
    .timeline { position: relative; padding-left: 2rem; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: #e0d8cf; }
    .timeline-item { position: relative; padding: 1rem 0; }
    .timeline-item::before { content: ''; position: absolute; left: -26px; top: 1.2rem; width: 12px; height: 12px; border-radius: 50%; background: #d87b4d; }
    .mobile-nav { display: none; }
    @media (max-width: 768px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-hero h1 { font-size: 2rem; }
      .nav { flex-wrap: wrap; gap: 0.5rem; }
      .nav a { margin: 0.3rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .order-card .detail-list { grid-template-columns: 1fr; }
      .table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="nav">
    <div>
      <a href="index.html" style="font-weight: 700; font-size: 1.1rem;">校园拼单平台</a>
    </div>
    <div>
      <a href="login.html">用户登录</a>
      <a href="admin-login.html">管理员</a>
    </div>
  </div>

    <h2>页面导航</h2>
    
    <div class="card">
      <h3>用户端</h3>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.5rem;">
        <a href="login.html" class="btn btn-secondary">登录</a>
        <a href="register.html" class="btn btn-secondary">注册</a>
        <a href="verify-student.html" class="btn btn-secondary">实名认证</a>
        <a href="orders.html" class="btn btn-secondary">拼单大厅</a>
        <a href="create-order.html" class="btn btn-secondary">发起拼单</a>
        <a href="order-detail.html" class="btn btn-secondary">订单详情</a>
        <a href="my-orders.html" class="btn btn-secondary">我的拼单</a>
        <a href="profile.html" class="btn btn-secondary">个人资料</a>

        <a href="complaints.html" class="btn btn-secondary">我的投诉</a>

        <a href="complaint-detail.html" class="btn btn-secondary">投诉详情</a>
      </div>
    </div>

    <div class="card">
      <h3>管理员端</h3>
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.5rem;">
        <a href="admin-login.html" class="btn btn-outline">管理员登录</a>
        <a href="admin-dashboard.html" class="btn btn-outline">管理台</a>
        <a href="admin-users.html" class="btn btn-outline">用户管理</a>

  </div>
</body>
</html>
