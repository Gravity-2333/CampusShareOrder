<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单详情 - 管理员后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f3ef; min-height: 100vh; }
    .app-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); color: white; padding: 1rem; }
    .sidebar .brand { padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
    .sidebar .brand-mark { width: 40px; height: 40px; background: rgba(242,203,184,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .sidebar .brand h1 { font-size: 1.2rem; margin-top: 0.5rem; }
    .sidebar .menu { list-style: none; }
    .sidebar .menu li { margin-bottom: 0.3rem; }
    .sidebar .menu a { display: block; padding: 0.7rem; border-radius: 10px; color: rgba(255,255,255,0.8); text-decoration: none; }
    .sidebar .menu a:hover { background: rgba(255,255,255,0.1); }
    .sidebar .menu a.active { background: rgba(242,203,184,0.2); color: white; }
    .main { padding: 1rem; display: flex; flex-direction: column; }
    .header { background: white; border-radius: 12px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .header h2 { color: #2c3e50; }
    .header .actions { display: flex; align-items: center; gap: 0.5rem; }
    .content { flex: 1; }
    .section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .section-header h3 { color: #2c3e50; margin: 0; }
    .detail-panel { background: white; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #e0d8cf; }
    .detail-panel h4 { color: #2c3e50; margin-bottom: 1rem; }
    .detail-list { list-style: none; }
    .detail-list li { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #f0ebe4; }
    .detail-list li:last-child { border-bottom: none; }
    .detail-list span { color: #6b7c70; }
    .detail-list strong { color: #2c3e50; }
    .tag { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .tag-success { background: #d4edda; color: #155724; }
    .tag-warning { background: #fff3cd; color: #856404; }
    .tag-info { background: #d1ecf1; color: #0c5460; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-secondary { background: #f0ebe4; color: #2c3e50; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #f0ebe4; }
    .table th { background: #f8f6f2; color: #4a6b5a; }
    @media (max-width: 768px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .header { flex-direction: column; align-items: flex-start; }
      .table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">ADMIN</div>
        <h1>管理员后台</h1>
      </div>
      <ul class="menu">
        <li><a href="admin-dashboard.html">仪表盘</a></li>
        <li><a href="admin-orders.html" class="active">订单管理</a></li>
        <li><a href="admin-complaints.html">投诉管理</a></li>
        <li><a href="admin-users.html">用户管理</a></li>
        <li><a href="admin-reports.html">数据报表</a></li>
        <li><a href="login.html">退出登录</a></li>
      </ul>
    </div>
    
    <div class="main">
      <div class="header">
        <h2>订单详情</h2>
        <div class="actions">
          <span style="color: #6b7c70; margin-right: 1rem;">管理员</span>
          <button class="btn btn-secondary" onclick="location.href='login.html'">退出登录</button>
        </div>
      </div>
      
      <div class="content">
        <div class="section">
          <div class="section-header">
            <div>
              <span class="tag tag-warning">招募中</span>
              <h3>订单号：ORD2024001</h3>
            </div>
            <button class="btn btn-danger">取消订单</button>
          </div>

          <div class="detail-panel">
            <h4>订单信息</h4>
            <ul class="detail-list">
              <li><span>商品名称</span><strong>奶茶拼单</strong></li>
              <li><span>取货点</span><strong>东区宿舍门口</strong></li>
              <li><span>截止时间</span><strong>2024-01-15 18:00</strong></li>
              <li><span>发起人</span><strong>李四</strong></li>
              <li><span>预计金额</span><strong>68.00</strong></li>
              <li><span>招募人数</span><strong>2/4</strong></li>
            </ul>
            <div style="border-top: 1px solid #e0d8cf; padding-top: 1rem; margin-top: 1rem;">
              <span style="color: #6b7c70;">商品备注</span>
              <p style="color: #2c3e50; margin-top: 0.3rem;">珍珠奶茶，少糖少冰</p>
            </div>
          </div>

          <div>
            <h4>成员列表</h4>
            <table class="table">
              <thead>
                <tr>
                  <th>成员</th>
                  <th>角色</th>
                  <th>支付状态</th>
                  <th>收货状态</th>
                  <th>应付金额</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>李四</td>
                  <td>发起人</td>
                  <td><span class="tag tag-success">已支付</span></td>
                  <td><span class="tag tag-info">待确认</span></td>
                  <td>17.00</td>
                </tr>
                <tr>
                  <td>张三</td>
                  <td>普通成员</td>
                  <td><span class="tag tag-warning">待支付</span></td>
                  <td><span class="tag tag-info">待确认</span></td>
                  <td>17.00</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="page-actions" style="margin-top: 1.5rem; padding: 1rem; background: #f8f6f2; border-radius: 10px;">
            <button class="btn btn-secondary" onclick="location.href='admin-orders.html'">返回列表</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
