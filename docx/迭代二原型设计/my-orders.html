<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的拼单 - 校园拼单平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f3ef; min-height: 100vh; }
    .app-shell { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar { background: linear-gradient(180deg, #2e3f34 0%, #24342b 100%); color: white; padding: 1rem; }
    .sidebar .brand { padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; }
    .sidebar .brand-mark { width: 40px; height: 40px; background: rgba(242,203,184,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    .sidebar .brand h1 { font-size: 1.2rem; margin-top: 0.5rem; }
    .sidebar .menu { list-style: none; }
    .sidebar .menu li { margin-bottom: 0.3rem; }
    .sidebar .menu a { display: block; padding: 0.7rem; border-radius: 10px; color: rgba(255,255,255,0.8); text-decoration: none; }
    .sidebar .menu a:hover { background: rgba(255,255,255,0.1); }
    .sidebar .menu a.active { background: rgba(242,203,184,0.2); color: white; }
    .main { padding: 1rem; display: flex; flex-direction: column; }
    .header { background: white; border-radius: 12px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .header h2 { color: #2e3f34; }
    .header .actions { display: flex; align-items: center; gap: 0.5rem; }
    .header .welcome { color: #6b7c70; margin-right: 1rem; }
    .content { flex: 1; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .stat-card { background: white; border-radius: 12px; padding: 1rem; }
    .stat-card .label { color: #6b7c70; font-size: 0.85rem; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #2e3f34; }
    .section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
    .section-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .section-header h3 { color: #2e3f34; margin: 0; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #d87b4d; color: white; }
    .btn-secondary { background: #f0ebe4; color: #2e3f34; }
    .btn-outline { border: 1px solid #d87b4d; color: #d87b4d; background: white; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #f0ebe4; }
    .table th { background: #f8f6f2; color: #4a6b5a; }
    .table a { color: #d87b4d; text-decoration: none; }
    .tag { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .tag-success { background: #d4edda; color: #155724; }
    .tag-warning { background: #fff3cd; color: #856404; }
    .tag-danger { background: #f8d7da; color: #721c24; }
    .tag-info { background: #d1ecf1; color: #0c5460; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 1rem; }
    .pagination button { padding: 0.5rem 0.8rem; border: 1px solid #e0d8cf; background: white; border-radius: 6px; cursor: pointer; }
    .pagination button.active { background: #2e3f34; color: white; }
    .empty-state { text-align: center; padding: 3rem; }
    .empty-state h4 { color: #2e3f34; margin-bottom: 0.5rem; }
    .empty-state p { color: #6b7c70; }
    @media (max-width: 768px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .header { flex-direction: column; align-items: flex-start; }
      .table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">CSO</div>
        <h1>校园拼单平台</h1>
      </div>
      <ul class="menu">
        <li><a href="orders.html">拼单大厅</a></li>
        <li><a href="create-order.html">发起拼单</a></li>
        <li><a href="my-orders.html" class="active">我的拼单</a></li>
        <li><a href="complaints.html">我的投诉</a></li>
        <li><a href="profile.html">个人资料</a></li>
        <li><a href="credit.html">信用分</a></li>
      </ul>
    </div>
    
    <div class="main">
      <div class="header">
        <h2>我的拼单</h2>
        <div class="actions">
          <span class="welcome">欢迎，张三</span>
          <button class="btn btn-secondary" onclick="location.href='login.html'">退出登录</button>
        </div>
      </div>
      
      <div class="content">
        <div class="stats">
          <div class="stat-card">
            <div class="label">参与订单</div>
            <div class="value">3</div>
          </div>
          <div class="stat-card">
            <div class="label">待收货</div>
            <div class="value">1</div>
          </div>
          <div class="stat-card">
            <div class="label">待支付</div>
            <div class="value">1</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h3>我的拼单</h3>
            <div class="page-actions">
              <button class="btn btn-secondary" onclick="location.href='orders.html'">返回拼单大厅</button>
              <button class="btn btn-outline" onclick="location.href='create-order.html'">发起新拼单</button>
            </div>
          </div>

          <table class="table">
            <thead>
              <tr>
                <th>订单号</th>
                <th>商品</th>
                <th>我的角色</th>
                <th>支付状态</th>
                <th>收货状态</th>
                <th>订单状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>ORD2024001</td>
                <td>奶茶拼单</td>
                <td>普通成员</td>
                <td><span class="tag tag-warning">待支付</span></td>
                <td><span class="tag tag-info">待确认</span></td>
                <td><span class="tag tag-warning">招募中</span></td>
                <td><a href="order-detail.html">查看详情</a></td>
              </tr>
              <tr>
                <td>ORD2024004</td>
                <td>零食拼单</td>
                <td>发起人</td>
                <td><span class="tag tag-success">已支付</span></td>
                <td><span class="tag tag-info">待确认</span></td>
                <td><span class="tag tag-info">待送达</span></td>
                <td><a href="order-detail.html">查看详情</a></td>
              </tr>
              <tr>
                <td>ORD2024005</td>
                <td>水果拼单</td>
                <td>普通成员</td>
                <td><span class="tag tag-success">已支付</span></td>
                <td><span class="tag tag-success">已收货</span></td>
                <td><span class="tag tag-success">已完成</span></td>
                <td><a href="order-detail.html">查看详情</a></td>
              </tr>
            </tbody>
          </table>

          <div class="pagination">
            <button>上一页</button>
            <button class="active">1</button>
            <button>下一页</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
